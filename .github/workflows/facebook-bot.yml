name: Facebook DTU Telegram Bot

on:
  # Chỉ Cloudflare Worker hoặc người dùng kích hoạt.
  # Không dùng GitHub schedule nữa để tránh chạy trùng.
  workflow_dispatch:
    inputs:
      mode:
        description: "normal = kiểm tra bài mới; test3 = gửi thử tối đa 3 bài"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - test3

permissions:
  contents: write

# Không cho hai bot chạy đồng thời.
# Lượt sau phải chờ lượt trước hoàn tất.
concurrency:
  group: facebook-dtu-telegram-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Luôn lấy nhánh main mới nhất tại thời điểm job thực sự bắt đầu.
      # Tránh đọc state.json cũ khi workflow phải xếp hàng.
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIORITY_CHAT_ID: ${{ secrets.TELEGRAM_PRIORITY_CHAT_ID }}
          FACEBOOK_COOKIES_JSON: ${{ secrets.FACEBOOK_COOKIES_JSON }}
          BOT_MODE: ${{ github.event.inputs.mode || 'normal' }}
        run: node bot.js

      # Chỉ lưu state khi bot chạy thành công và không phải test3.
      - name: Save state.json
        if: ${{ success() && github.event.inputs.mode != 'test3' }}
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json không thay đổi."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json
          git commit -m "Update Facebook bot state"

          # Lấy thay đổi mới nhất trước khi push để tránh lỗi fetch first.
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-debug-${{ github.run_number }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 3
